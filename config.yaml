# PENPAL Analysis Configuration

# Active dataset (change this to switch between datasets)
active_dataset: "TEXT"  # Options: "TEXT", "Berlin"

# Data paths per dataset
datasets:
  TEXT:
    raw_dir: "data/TEXT/raw"
    interim_dir: "data/TEXT/interim"
    processed_dir: "data/TEXT/processed"
  Berlin:
    raw_dir: "data/Berlin/raw"
    interim_dir: "data/Berlin/interim"
    processed_dir: "data/Berlin/processed"

# Firestore settings
firestore:
  credentials_path: "environment/the-never-ending-story-a7b5f-firebase-adminsdk-ax73p-9014b38264.json"
  TEXT:
    collection_name: "story_data_TEXT"
    stories_collection: "stories_TEXT"
    min_interactions: 10
  Berlin:
    collection_name: "story_data_berlin"
    stories_collection: "stories"
    min_interactions: 5

# Cleaning parameters
cleaning:
  edit_distance_threshold: 100
  simulated: False      # whether to clean simulated or user dataset 
  TEXT:
    max_turns: 10        # maximum turns per story to keep during cleaning
  Berlin:
    max_turns: 5        # maximum turns per story to keep during cleaning

# Embedding models
embeddings:
  TEXT:
    model_name: "Kingsoft-LLM/QZhou-Embedding"
    batch_size: 1
    task: null
  Berlin:
    model_name: "jinaai/jina-embeddings-v3"
    batch_size: 1
    task: null

novelty:
  model_name: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  window_size: 128
  task: null
  hf_token: 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

exploration:
  max_k: 10

# Sentiment analysis
sentiment:
  TEXT:
    model_name: "cardiffnlp/twitter-roberta-base-sentiment-latest"
    batch_size: 64
    valence_method: "simple"  # "simple", "amplify", or "dampen"
    engine: 'projection'  # 'bert' or 'projection'
    language: 'en'
  Berlin:
    model_name: "ssary/XLM-RoBERTa-German-sentiment"
    batch_size: 64
    valence_method: "simple"  # "simple", "amplify", or "dampen"
    engine: 'projection'  # 'bert' or 'projection'
    language: 'de'
  axis: 'valence'       # Semantic Projection axis name


# Simulation parameters
simulation:
  Berlin:
    n_turns_per_story: 5
    model_name: "gpt-4o-mini"
    seed: 42
    # OpenAI API key: set via environment variable OPENAI_API_KEY or pass to script
    client_ids: ["1", "2"]  # Client IDs to simulate
    workshop_ids: ["1", "2", "3"]  # Workshop IDs to simulate
    n_simulations: 2
  TEXT:
    n_turns_per_story: 10
    model_name: "gpt-4o-mini"
    seed: 42
    # OpenAI API key: set via environment variable OPENAI_API_KEY or pass to script
    client_ids: ["1", "2"]  # Client IDs to simulate
    workshop_ids: ["1", "2", "3"]  # Workshop IDs to simulate
    n_simulations: 2

# textdescriptives (skud ud Lasse)
surface_metrics: 
  spacy_mdl: "en_core_web_md" 
  batch_size: 10
  n_process: 5


# Analysis parameters
analysis:
  random_seed: 42
  languages:
    - "de"  # German only for now
